<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoteles - NocheLista</title>
    <link rel="icon" type="image/png" href="./imagenes/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .filtros { background: #f8f9fa; border-radius: 12px; padding: 20px; }
        @media (max-width: 768px) { .filtros .row > div { margin-bottom: 10px; } }
    </style>
</head>
<body>
    <header class="cabecera">
        <div class="logo">
            <a href="index.html"><img src="imagenes/logo.jpeg" alt="Logo NocheLista"></a>
        </div>
        <nav>
            <input type="checkbox" id="check">
            <label for="check" class="checkbtn"><i class="fas fa-bars"></i></label>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="hoteles.html">Hoteles</a></li>
                <li><a href="mis-reservas.html">Mis Reservas</a></li>
                <li><a href="index.html#app">App</a></li>
                <li><a href="index.html#contacto">Contacto</a></li>
            </ul>
        </nav>
        <div class="icono-usuario">
            <a href="Carp_login/login.html"><img src="imagenes/perfil.png" alt="Perfil Usuario" style="border-radius: 50%;"></a>
            <span id="userGreeting" style="color: #333; margin-left: 8px; font-size: 14px;"></span>
        </div>
    </header>

    <main class="container my-5">
        <h1 class="fw-bold mb-4">Todos los Hoteles</h1>

        <div class="filtros mb-4">
            <form id="filtrosForm" class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small">Buscar</label>
                    <input type="text" class="form-control" name="nombre" placeholder="Nombre del hotel...">
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Ciudad</label>
                    <input type="text" class="form-control" name="ciudad" placeholder="Quito">
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Estrellas</label>
                    <select class="form-select" name="estrellas">
                        <option value="">Todas</option>
                        <option value="3">3 ★</option>
                        <option value="4">4 ★</option>
                        <option value="5">5 ★</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small">Precio máx.</label>
                    <input type="number" class="form-control" name="precio_max" placeholder="500" min="1">
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100"><i class="fas fa-search me-1"></i>Buscar</button>
                </div>
            </form>
        </div>

        <div id="hotelesContainer" class="row g-4">
            <div class="col-12"><p class="text-muted text-center py-5">Cargando hoteles...</p></div>
        </div>
    </main>

    <footer class="pie-pagina">
        <div class="columna-pie informacion-marca">
            <img src="imagenes/logo.jpeg" alt="Logo NocheLista">
            <p class="nombres">Alfredo Fuel, Merchan, Sanches</p>
            <p class="derechos">2026 Derechos Reservados</p>
        </div>
        <div class="columna-pie">
            <h4>Servicio al Cliente</h4>
            <a href="index.html#contacto">Contáctanos</a>
            <a href="#">Ayuda/FAQ</a>
            <a href="#">Soporte experto</a>
        </div>
        <div class="columna-pie">
            <h4>Legal</h4>
            <a href="#">Términos y Condiciones</a>
            <a href="#">Política de Privacidad</a>
        </div>
        <div class="columna-pie redes-sociales">
            <div class="iconos-redes">
                <a href="https://wa.me/0000000000" target="_blank"><img src="imagenes/whatsapp.png" alt="WhatsApp"></a>
                <a href="https://www.instagram.com/" target="_blank"><img src="imagenes/instagram.png" alt="Instagram"></a>
                <a href="https://www.youtube.com/" target="_blank"><img src="imagenes/yotube.png" alt="YouTube"></a>
                <a href="https://twitter.com/" target="_blank"><img src="imagenes/x.png" alt="Twitter"></a>
                <a href="https://www.facebook.com/" target="_blank"><img src="imagenes/facebook.png" alt="Facebook"></a>
                <a href="https://www.pinterest.com/" target="_blank"><img src="imagenes/printerest.png" alt="Pinterest"></a>
            </div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
<script>
updateNavGreeting();

const user = getStoredUser();
if (user) {
    const nav = document.querySelector('nav ul');
    if (user.rol === 'admin') nav.insertAdjacentHTML('beforeend', '<li><a href="admin/dashboard.html" style="color:#dc3545;">Admin</a></li>');
    if (user.rol === 'gestor') nav.insertAdjacentHTML('beforeend', '<li><a href="gestor/dashboard.html" style="color:#0d6efd;">Gestor</a></li>');
}

async function cargarHoteles(params = {}) {
    const container = document.getElementById("hotelesContainer");
    container.innerHTML = '<div class="col-12"><p class="text-muted text-center py-5">Cargando...</p></div>';
    try {
        let endpoint = '/buscar/?';
        const queryParts = [];
        if (params.nombre) queryParts.push(`nombre=${encodeURIComponent(params.nombre)}`);
        if (params.ciudad) queryParts.push(`ciudad=${encodeURIComponent(params.ciudad)}`);
        if (params.estrellas) queryParts.push(`estrellas=${params.estrellas}`);
        if (params.precio_max) queryParts.push(`precio_max=${params.precio_max}`);

        let hoteles;
        if (queryParts.length > 0) {
            hoteles = await apiFetch(endpoint + queryParts.join('&'));
        } else {
            hoteles = await apiFetch('/hoteles/');
        }

        if (!hoteles.length) {
            container.innerHTML = '<div class="col-12"><p class="text-muted text-center py-5">No se encontraron hoteles.</p></div>';
            return;
        }
        container.innerHTML = hoteles.map(h => `
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm h-100 border-0">
                    <img src="${h.imagen_url || 'imagenes/' + (h.imagen_principal || 'principal.avif')}" class="card-img-top" alt="${h.nombre}" style="height: 200px; object-fit: cover;" onerror="this.src='imagenes/principal.avif'">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold">${h.nombre}</h5>
                        <p class="text-warning mb-1">${getStarsHtml(h.estrellas)}</p>
                        <p class="text-muted small mb-1">📍 ${h.direccion || h.ciudad || 'Quito'}</p>
                        <p class="text-muted small flex-grow-1">${(h.descripcion || '').substring(0, 120)}...</p>
                        <a href="detalles_pag/detalle.html?id=${h.id}" class="btn btn-primary w-100 mt-2">Ver Detalles</a>
                    </div>
                </div>
            </div>
        `).join('');
    } catch (e) {
        container.innerHTML = `<div class="col-12"><p class="text-danger text-center">Error: ${e.message}</p></div>`;
    }
}

document.getElementById("filtrosForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const form = e.target;
    cargarHoteles({
        nombre: form.nombre.value.trim(),
        ciudad: form.ciudad.value.trim(),
        estrellas: form.estrellas.value,
        precio_max: form.precio_max.value
    });
});

cargarHoteles();
</script>
</body>
</html>
