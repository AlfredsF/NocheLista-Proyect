<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - NocheLista</title>
    <link rel="icon" type="image/png" href="../imagenes/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../estilos.css">
</head>
<body>
    <header class="cabecera">
        <div class="logo">
            <a href="../index.html"><img src="../imagenes/logo.jpeg" alt="Logo NocheLista"></a>
        </div>
        <nav>
            <input type="checkbox" id="check">
            <label for="check" class="checkbtn"><i class="fas fa-bars"></i></label>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="solicitudes.html">Solicitudes</a></li>
                <li><a href="gestion-usuarios.html">Usuarios</a></li>
                <li><a href="../index.html">Salir</a></li>
            </ul>
        </nav>
        <div class="icono-usuario">
            <img src="../imagenes/perfil.png" alt="Admin" style="border-radius:50%;height:40px;">
            <span id="userGreeting" style="color:#333;margin-left:8px;font-size:14px;"></span>
        </div>
    </header>

    <main class="container my-5">
        <h1 class="fw-bold mb-4">Panel de Administración</h1>
        <div id="metricasContainer" class="row g-4 mb-5"></div>
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title"><i class="fas fa-hotel text-primary me-2"></i>Solicitudes Pendientes</h5>
                        <p class="display-6 fw-bold text-primary" id="solicitudesCount">0</p>
                        <a href="solicitudes.html" class="btn btn-primary btn-sm">Gestionar</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title"><i class="fas fa-users text-success me-2"></i>Usuarios Registrados</h5>
                        <p class="display-6 fw-bold text-success" id="usuariosCount">0</p>
                        <a href="gestion-usuarios.html" class="btn btn-success btn-sm">Gestionar</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title"><i class="fas fa-building text-info me-2"></i>Hoteles Activos</h5>
                        <p class="display-6 fw-bold text-info" id="hotelesCount">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title"><i class="fas fa-dollar-sign text-warning me-2"></i>Ingresos Totales</h5>
                        <p class="display-6 fw-bold text-warning" id="ingresosCount">$0</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="pie-pagina">
        <div class="columna-pie informacion-marca">
            <img src="../imagenes/logo.jpeg" alt="Logo">
            <p class="derechos">2026 NocheLista</p>
        </div>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        updateNavGreeting();
        const token = getToken();
        const user = getStoredUser();
        if (!token || !user || user.rol !== 'admin') {
            window.location.href = '../Carp_login/login.html';
        }

        async function loadMetricas() {
            try {
                const data = await apiFetch('/admin/metricas/');
                document.getElementById('solicitudesCount').textContent = data.solicitudes_pendientes || 0;
                document.getElementById('usuariosCount').textContent = data.total_usuarios || 0;
                document.getElementById('hotelesCount').textContent = data.total_hoteles || 0;
                document.getElementById('ingresosCount').textContent = '$' + (data.ingresos_totales || 0).toLocaleString();
            } catch (e) {
                console.error('Error cargando métricas:', e);
            }
        }
        loadMetricas();
    </script>
</body>
</html>
