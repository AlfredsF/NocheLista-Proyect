<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes - Admin NocheLista</title>
    <link rel="icon" type="image/png" href="../imagenes/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../estilos.css">
</head>
<body>
    <header class="cabecera">
        <div class="logo">
            <a href="../index.html"><img src="../imagenes/logo.jpeg" alt="Logo"></a>
        </div>
        <nav>
            <input type="checkbox" id="check">
            <label for="check" class="checkbtn"><i class="fas fa-bars"></i></label>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="solicitudes.html">Solicitudes</a></li>
                <li><a href="gestion-usuarios.html">Usuarios</a></li>
            </ul>
        </nav>
        <div class="icono-usuario">
            <img src="../imagenes/perfil.png" alt="Admin" style="border-radius:50%;height:40px;">
            <span id="userGreeting" style="color:#333;margin-left:8px;font-size:14px;"></span>
        </div>
    </header>

    <main class="container my-5">
        <h1 class="fw-bold mb-4">Solicitudes de Afiliación</h1>
        <div class="mb-3">
            <select id="filtroEstado" class="form-select w-auto" onchange="cargarSolicitudes()">
                <option value="">Todas</option>
                <option value="pendiente">Pendientes</option>
                <option value="aprobada">Aprobadas</option>
                <option value="rechazada">Rechazadas</option>
            </select>
        </div>
        <div id="solicitudesContainer">
            <p class="text-muted text-center py-5">Cargando...</p>
        </div>
    </main>

    <footer class="pie-pagina">
        <div class="columna-pie informacion-marca">
            <img src="../imagenes/logo.jpeg" alt="Logo">
            <p class="derechos">2026 NocheLista</p>
        </div>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        updateNavGreeting();
        const token = getToken();
        const user = getStoredUser();
        if (!token || !user || user.rol !== 'admin') {
            window.location.href = '../Carp_login/login.html';
        }

        async function cargarSolicitudes() {
            const container = document.getElementById('solicitudesContainer');
            const estado = document.getElementById('filtroEstado').value;
            try {
                let endpoint = '/admin/solicitudes/';
                if (estado) endpoint += `?estado=${estado}`;
                const data = await apiFetch(endpoint);
                if (!data.length) {
                    container.innerHTML = '<p class="text-muted text-center py-5">No hay solicitudes.</p>';
                    return;
                }
                container.innerHTML = data.map(s => `
                    <div class="card shadow-sm mb-3 border-0">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h5 class="fw-bold">${s.nombre_hotel}</h5>
                                    <p class="mb-1 text-muted">${s.descripcion.substring(0, 150)}...</p>
                                    <p class="mb-1 small text-muted">📍 ${s.direccion}, ${s.ciudad}</p>
                                    <span class="badge ${s.estado === 'pendiente' ? 'bg-warning' : s.estado === 'aprobada' ? 'bg-success' : 'bg-danger'}">${s.estado}</span>
                                    <small class="text-muted ms-2">Creado: ${new Date(s.creado_en).toLocaleDateString()}</small>
                                </div>
                                ${s.estado === 'pendiente' ? `
                                <div class="d-flex gap-2">
                                    <button class="btn btn-success btn-sm" onclick="aprobar('${s.id}')">Aprobar</button>
                                    <button class="btn btn-danger btn-sm" onclick="rechazar('${s.id}')">Rechazar</button>
                                </div>` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = `<p class="text-danger text-center">Error: ${e.message}</p>`;
            }
        }

        async function aprobar(id) {
            if (!confirm('¿Aprobar esta solicitud? Se creará un hotel y el usuario será gestor.')) return;
            await apiFetch(`/admin/solicitudes/${id}/`, { method: 'PUT', body: JSON.stringify({ estado: 'aprobada' }) });
            cargarSolicitudes();
        }

        async function rechazar(id) {
            if (!confirm('¿Rechazar esta solicitud?')) return;
            await apiFetch(`/admin/solicitudes/${id}/`, { method: 'PUT', body: JSON.stringify({ estado: 'rechazada' }) });
            cargarSolicitudes();
        }

        cargarSolicitudes();
    </script>
</body>
</html>
