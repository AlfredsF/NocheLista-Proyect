<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="estilos_login.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Inicia Sesión - NocheLista</title>
</head>
<body>
    <main>
        <form class="login" id="form_login">
            <h2>Bienvenido</h2>
            
            <div class="inputs">
                <i class="fa-solid fa-user"></i>
                <input type="text" placeholder="Usuario" id="Usuario" required>
            </div>
            
            <div class="inputs">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Contraseña" id="contrasena" required>
            </div>
            
            <button type="submit" id="id_button">Iniciar Sesión</button>
            
            <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
            <p><a href="../index.html"><i class="fa-solid fa-arrow-left"></i> Volver al Inicio</a></p>
        </form>
    </main>
    
    <script src="login_users.js"></script>
</body>
</html>
