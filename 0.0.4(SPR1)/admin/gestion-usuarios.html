<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Admin NocheLista</title>
    <link rel="icon" type="image/png" href="../imagenes/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../estilos.css">
</head>
<body>
    <header class="cabecera">
        <div class="logo">
            <a href="../index.html"><img src="../imagenes/logo.jpeg" alt="Logo"></a>
        </div>
        <nav>
            <input type="checkbox" id="check">
            <label for="check" class="checkbtn"><i class="fas fa-bars"></i></label>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="solicitudes.html">Solicitudes</a></li>
                <li><a href="gestion-usuarios.html">Usuarios</a></li>
            </ul>
        </nav>
        <div class="icono-usuario">
            <img src="../imagenes/perfil.png" alt="Admin" style="border-radius:50%;height:40px;">
            <span id="userGreeting" style="color:#333;margin-left:8px;font-size:14px;"></span>
        </div>
    </header>

    <main class="container my-5">
        <h1 class="fw-bold mb-4">Gestión de Usuarios</h1>
        <div id="usuariosContainer">
            <p class="text-muted text-center py-5">Cargando...</p>
        </div>
    </main>

    <footer class="pie-pagina">
        <div class="columna-pie informacion-marca">
            <img src="../imagenes/logo.jpeg" alt="Logo">
            <p class="derechos">2026 NocheLista</p>
        </div>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        updateNavGreeting();
        const token = getToken();
        const user = getStoredUser();
        if (!token || !user || user.rol !== 'admin') {
            window.location.href = '../Carp_login/login.html';
        }

        async function cargarUsuarios() {
            const container = document.getElementById('usuariosContainer');
            try {
                const data = await apiFetch('/admin/usuarios/');
                if (!data.length) {
                    container.innerHTML = '<p class="text-muted text-center py-5">No hay usuarios.</p>';
                    return;
                }
                const roles = { cliente: 'Cliente', gestor: 'Gestor', admin: 'Admin' };
                container.innerHTML = `
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>Usuario</th>
                                    <th>Email</th>
                                    <th>Nombre</th>
                                    <th>Rol</th>
                                    <th>Teléfono</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.map(u => `
                                <tr>
                                    <td>${u.username}</td>
                                    <td>${u.email}</td>
                                    <td>${u.nombre_completo}</td>
                                    <td><span class="badge ${u.rol === 'admin' ? 'bg-danger' : u.rol === 'gestor' ? 'bg-primary' : 'bg-secondary'}">${roles[u.rol] || u.rol}</span></td>
                                    <td>${u.telefono || '-'}</td>
                                    <td>
                                        <select class="form-select form-select-sm d-inline-block w-auto" onchange="cambiarRol('${u.id}', this.value)">
                                            <option value="cliente" ${u.rol === 'cliente' ? 'selected' : ''}>Cliente</option>
                                            <option value="gestor" ${u.rol === 'gestor' ? 'selected' : ''}>Gestor</option>
                                            <option value="admin" ${u.rol === 'admin' ? 'selected' : ''}>Admin</option>
                                        </select>
                                        <button class="btn btn-danger btn-sm ms-2" onclick="eliminarUsuario('${u.id}')"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>`;
            } catch (e) {
                container.innerHTML = `<p class="text-danger text-center">Error: ${e.message}</p>`;
            }
        }

        async function cambiarRol(id, rol) {
            try {
                await apiFetch(`/admin/usuarios/${id}/`, { method: 'PUT', body: JSON.stringify({ rol }) });
                alert('Rol actualizado');
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        async function eliminarUsuario(id) {
            if (!confirm('¿Eliminar este usuario permanentemente?')) return;
            try {
                await apiFetch(`/admin/usuarios/${id}/`, { method: 'DELETE' });
                cargarUsuarios();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        cargarUsuarios();
    </script>
</body>
</html>
