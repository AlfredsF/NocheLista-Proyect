<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas - NocheLista</title>
    <link rel="icon" type="image/png" href="./imagenes/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header class="cabecera">
        <div class="logo">
            <a href="index.html"><img src="imagenes/logo.jpeg" alt="Logo NocheLista"></a>
        </div>
        <nav>
            <input type="checkbox" id="check">
            <label for="check" class="checkbtn"><i class="fas fa-bars"></i></label>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="hoteles.html">Hoteles</a></li>
                <li><a href="mis-reservas.html">Mis Reservas</a></li>
                <li><a href="index.html#app">App</a></li>
                <li><a href="index.html#contacto">Contacto</a></li>
            </ul>
        </nav>
        <div class="icono-usuario">
            <a href="Carp_login/login.html"><img src="imagenes/perfil.png" alt="Perfil Usuario" style="border-radius: 50%;"></a>
            <span id="userGreeting" style="color: #333; margin-left: 8px; font-size: 14px;"></span>
        </div>
    </header>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold">Mis Reservas</h1>
            <a href="hoteles.html" class="btn btn-primary">+ Nueva Reserva</a>
        </div>
        <div id="reservasContainer">
            <p class="text-muted text-center py-5">Cargando tus reservas...</p>
        </div>
    </main>

    <footer class="pie-pagina">
        <div class="columna-pie informacion-marca">
            <img src="imagenes/logo.jpeg" alt="Logo NocheLista">
            <p class="nombres">Alfredo Fuel, Merchan, Sanches</p>
            <p class="derechos">2026 Derechos Reservados</p>
        </div>
        <div class="columna-pie">
            <h4>Servicio al Cliente</h4>
            <a href="index.html#contacto">Contáctanos</a>
            <a href="#">Ayuda/FAQ</a>
            <a href="#">Soporte experto</a>
        </div>
        <div class="columna-pie">
            <h4>Legal</h4>
            <a href="#">Términos y Condiciones</a>
            <a href="#">Política de Privacidad</a>
        </div>
        <div class="columna-pie redes-sociales">
            <div class="iconos-redes">
                <a href="https://wa.me/0000000000" target="_blank"><img src="imagenes/whatsapp.png" alt="WhatsApp"></a>
                <a href="https://www.instagram.com/" target="_blank"><img src="imagenes/instagram.png" alt="Instagram"></a>
                <a href="https://www.youtube.com/" target="_blank"><img src="imagenes/yotube.png" alt="YouTube"></a>
                <a href="https://twitter.com/" target="_blank"><img src="imagenes/x.png" alt="Twitter"></a>
                <a href="https://www.facebook.com/" target="_blank"><img src="imagenes/facebook.png" alt="Facebook"></a>
                <a href="https://www.pinterest.com/" target="_blank"><img src="imagenes/printerest.png" alt="Pinterest"></a>
            </div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
<script>
updateNavGreeting();

const token = getToken();
const user = getStoredUser();

if (!token || !user) {
    window.location.href = "Carp_login/login.html";
}

const estadoLabels = {
    pendiente: { text: 'Pendiente', class: 'bg-warning' },
    confirmada: { text: 'Confirmada', class: 'bg-success' },
    cancelada: { text: 'Cancelada', class: 'bg-danger' },
    completada: { text: 'Completada', class: 'bg-info' }
};

async function cargarReservas() {
    const container = document.getElementById("reservasContainer");
    try {
        const data = await apiFetch('/reservas/');
        if (!data.length) {
            container.innerHTML = `<div class="text-center py-5"><p class="text-muted fs-5">No tienes reservas aún.</p><a href="hoteles.html" class="btn btn-primary mt-3">Explorar Hoteles</a></div>`;
            return;
        }
        container.innerHTML = data.map(r => {
            const est = estadoLabels[r.estado] || { text: r.estado, class: 'bg-secondary' };
            return `
            <div class="card shadow-sm mb-3 border-0">
                <div class="card-body">
                    <div class="d-flex flex-wrap align-items-center justify-content-between">
                        <div>
                            <h5 class="fw-bold mb-1">${r.hotel_nombre || 'Hotel'}</h5>
                            <p class="mb-1 text-muted small">Habitación: ${r.habitacion_nombre || tipoHabitacionLabels[r.habitacion_tipo] || 'N/A'} | ${formatCurrency(r.precio_total)}</p>
                            <p class="mb-0 text-muted small">${formatDate(r.fecha_entrada)} → ${formatDate(r.fecha_salida)}</p>
                            <small class="text-muted">Reservado: ${new Date(r.creado_en).toLocaleDateString()}</small>
                            <span class="badge ${est.class} ms-2">${est.text}</span>
                        </div>
                        <div class="mt-2 mt-md-0">
                            ${r.estado === 'pendiente' || r.estado === 'confirmada' ? `<button class="btn btn-outline-danger btn-sm" onclick="cancelarReserva('${r.id}')">Cancelar</button>` : ''}
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
    } catch (e) {
        container.innerHTML = `<div class="text-center py-5"><p class="text-danger">Error al cargar reservas: ${e.message}</p></div>`;
    }
}

async function cancelarReserva(id) {
    if (!confirm("¿Cancelar esta reserva?")) return;
    try {
        await apiFetch('/reservas/' + id + '/', { method: 'DELETE' });
        cargarReservas();
    } catch (e) {
        alert('Error: ' + e.message);
    }
}

cargarReservas();
</script>
</body>
</html>
