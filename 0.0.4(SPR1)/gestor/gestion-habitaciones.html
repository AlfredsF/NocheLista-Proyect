<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitaciones - Gestor NocheLista</title>
    <link rel="icon" type="image/png" href="../imagenes/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../estilos.css">
</head>
<body>
    <header class="cabecera">
        <div class="logo"><a href="../index.html"><img src="../imagenes/logo.jpeg" alt="Logo"></a></div>
        <nav>
            <input type="checkbox" id="check">
            <label for="check" class="checkbtn"><i class="fas fa-bars"></i></label>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="gestion-hotel.html">Mi Hotel</a></li>
                <li><a href="gestion-habitaciones.html">Habitaciones</a></li>
                <li><a href="promociones.html">Promociones</a></li>
            </ul>
        </nav>
        <div class="icono-usuario">
            <img src="../imagenes/perfil.png" alt="Gestor" style="border-radius:50%;height:40px;">
            <span id="userGreeting" style="color:#333;margin-left:8px;font-size:14px;"></span>
        </div>
    </header>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold">Habitaciones</h1>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalHabitacion" onclick="resetForm()">+ Nueva Habitación</button>
        </div>
        <div id="mensaje" class="mb-3"></div>
        <div id="habitacionesContainer">
            <p class="text-muted text-center py-5">Cargando...</p>
        </div>
    </main>

    <div class="modal fade" id="modalHabitacion" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Nueva Habitación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="habitacionForm">
                    <div class="modal-body">
                        <input type="hidden" name="edit_id">
                        <div class="mb-3">
                            <label class="form-label">Tipo</label>
                            <select class="form-select" name="tipo" required>
                                <option value="standard">Estándar</option>
                                <option value="deluxe">Deluxe</option>
                                <option value="suite">Suite</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" name="nombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" name="descripcion" rows="2"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Precio por noche ($)</label>
                                <input type="number" class="form-control" name="precio_por_noche" step="0.01" min="1" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Capacidad</label>
                                <input type="number" class="form-control" name="capacidad" min="1" value="2" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="pie-pagina">
        <div class="columna-pie informacion-marca">
            <img src="../imagenes/logo.jpeg" alt="Logo">
            <p class="derechos">2026 NocheLista</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        updateNavGreeting();
        const token = getToken();
        const user = getStoredUser();
        if (!token || !user || user.rol !== 'gestor') {
            window.location.href = '../Carp_login/login.html';
        }

        let hotelId = null;
        let modal = null;

        async function getHotelId() {
            if (hotelId) return hotelId;
            const data = await apiFetch('/gestor/hotel/');
            hotelId = data.id;
            return hotelId;
        }

        async function cargarHabitaciones() {
            const container = document.getElementById('habitacionesContainer');
            try {
                const hid = await getHotelId();
                const data = await apiFetch(`/habitaciones/?hotel_id=${hid}`);
                if (!data.length) {
                    container.innerHTML = '<p class="text-muted text-center py-5">No hay habitaciones registradas.</p>';
                    return;
                }
                container.innerHTML = data.map(h => `
                    <div class="card shadow-sm mb-3 border-0">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="fw-bold mb-1">${h.nombre}</h5>
                                <span class="badge bg-info me-2">${tipoHabitacionLabels[h.tipo] || h.tipo}</span>
                                <span class="fw-bold text-success">$${parseFloat(h.precio_por_noche).toFixed(2)}/noche</span>
                                <p class="mb-0 text-muted small">Capacidad: ${h.capacidad} personas ${h.disponible ? '<span class="badge bg-success">Disponible</span>' : '<span class="badge bg-danger">No disponible</span>'}</p>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-outline-primary" onclick="editarHabitacion('${h.id}')">Editar</button>
                                <button class="btn btn-sm btn-outline-danger" onclick="eliminarHabitacion('${h.id}')">Eliminar</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = `<p class="text-danger text-center">Error: ${e.message}</p>`;
            }
        }

        function resetForm() {
            document.getElementById('modalTitle').textContent = 'Nueva Habitación';
            document.getElementById('habitacionForm').reset();
            document.querySelector('[name="edit_id"]').value = '';
        }

        async function editarHabitacion(id) {
            try {
                const data = await apiFetch(`/habitaciones/${id}/`);
                document.getElementById('modalTitle').textContent = 'Editar Habitación';
                const form = document.getElementById('habitacionForm');
                form.edit_id.value = id;
                form.tipo.value = data.tipo;
                form.nombre.value = data.nombre;
                form.descripcion.value = data.descripcion || '';
                form.precio_por_noche.value = data.precio_por_noche;
                form.capacidad.value = data.capacidad;
                const modalEl = new bootstrap.Modal(document.getElementById('modalHabitacion'));
                modalEl.show();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        document.getElementById('habitacionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const msg = document.getElementById('mensaje');
            const editId = form.edit_id.value;
            const hid = await getHotelId();
            const body = {
                hotel_id: hid,
                tipo: form.tipo.value,
                nombre: form.nombre.value.trim(),
                descripcion: form.descripcion.value.trim(),
                precio_por_noche: parseFloat(form.precio_por_noche.value),
                capacidad: parseInt(form.capacidad.value)
            };
            try {
                if (editId) {
                    await apiFetch(`/habitaciones/${editId}/`, { method: 'PUT', body: JSON.stringify(body) });
                    msg.innerHTML = '<span style="color:green">Habitación actualizada</span>';
                } else {
                    await apiFetch('/habitaciones/', { method: 'POST', body: JSON.stringify(body) });
                    msg.innerHTML = '<span style="color:green">Habitación creada</span>';
                }
                bootstrap.Modal.getInstance(document.getElementById('modalHabitacion')).hide();
                cargarHabitaciones();
            } catch (err) {
                msg.innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
            }
        });

        async function eliminarHabitacion(id) {
            if (!confirm('¿Eliminar esta habitación?')) return;
            try {
                await apiFetch(`/habitaciones/${id}/`, { method: 'DELETE' });
                cargarHabitaciones();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        window.addEventListener('load', () => {
            if (document.getElementById('habitacionesContainer')) cargarHabitaciones();
        });
    </script>
</body>
</html>
