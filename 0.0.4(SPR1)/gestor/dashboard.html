<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor - NocheLista</title>
    <link rel="icon" type="image/png" href="../imagenes/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../estilos.css">
    <style>
        .metric-card { border-left: 4px solid; transition: transform .2s; }
        .metric-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
    <header class="cabecera">
        <div class="logo">
            <a href="../index.html"><img src="../imagenes/logo.jpeg" alt="Logo"></a>
        </div>
        <nav>
            <input type="checkbox" id="check">
            <label for="check" class="checkbtn"><i class="fas fa-bars"></i></label>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="gestion-hotel.html">Mi Hotel</a></li>
                <li><a href="gestion-habitaciones.html">Habitaciones</a></li>
                <li><a href="promociones.html">Promociones</a></li>
                <li><a href="../index.html">Salir</a></li>
            </ul>
        </nav>
        <div class="icono-usuario">
            <img src="../imagenes/perfil.png" alt="Gestor" style="border-radius:50%;height:40px;">
            <span id="userGreeting" style="color:#333;margin-left:8px;font-size:14px;"></span>
        </div>
    </header>

    <main class="container my-5">
        <h1 class="fw-bold mb-4">Dashboard de Gestor</h1>
        <div id="metricasContainer" class="row g-4 mb-5"></div>
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5>Reservas Confirmadas</h5>
                        <p class="display-6 fw-bold text-success" id="confirmadasCount">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5>Reservas Pendientes</h5>
                        <p class="display-6 fw-bold text-warning" id="pendientesCount">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5>Ingresos</h5>
                        <p class="display-6 fw-bold text-primary" id="ingresosCount">$0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5>Ocupación</h5>
                        <p class="display-6 fw-bold text-info" id="ocupacionCount">0%</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="pie-pagina">
        <div class="columna-pie informacion-marca">
            <img src="../imagenes/logo.jpeg" alt="Logo">
            <p class="derechos">2026 NocheLista</p>
        </div>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        updateNavGreeting();
        const token = getToken();
        const user = getStoredUser();
        if (!token || !user || user.rol !== 'gestor') {
            window.location.href = '../Carp_login/login.html';
        }

        async function loadMetricas() {
            try {
                const data = await apiFetch('/dashboard/hotel/');
                document.getElementById('confirmadasCount').textContent = data.confirmadas || 0;
                document.getElementById('pendientesCount').textContent = data.pendientes || 0;
                document.getElementById('ingresosCount').textContent = '$' + (data.ingresos_totales || 0).toLocaleString();
                document.getElementById('ocupacionCount').textContent = (data.ocupacion || 0) + '%';
            } catch (e) {
                document.getElementById('metricasContainer').innerHTML = `<div class="col-12"><p class="text-danger">Error: ${e.message}</p></div>`;
            }
        }
        loadMetricas();
    </script>
</body>
</html>
