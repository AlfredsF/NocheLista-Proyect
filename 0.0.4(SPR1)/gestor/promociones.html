<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promociones - Gestor NocheLista</title>
    <link rel="icon" type="image/png" href="../imagenes/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../estilos.css">
</head>
<body>
    <header class="cabecera">
        <div class="logo"><a href="../index.html"><img src="../imagenes/logo.jpeg" alt="Logo"></a></div>
        <nav>
            <input type="checkbox" id="check">
            <label for="check" class="checkbtn"><i class="fas fa-bars"></i></label>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="gestion-hotel.html">Mi Hotel</a></li>
                <li><a href="gestion-habitaciones.html">Habitaciones</a></li>
                <li><a href="promociones.html">Promociones</a></li>
            </ul>
        </nav>
        <div class="icono-usuario">
            <img src="../imagenes/perfil.png" alt="Gestor" style="border-radius:50%;height:40px;">
            <span id="userGreeting" style="color:#333;margin-left:8px;font-size:14px;"></span>
        </div>
    </header>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold">Promociones</h1>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalPromocion" onclick="resetPromoForm()">+ Nueva Promoción</button>
        </div>
        <div id="mensaje" class="mb-3"></div>
        <div id="promocionesContainer">
            <p class="text-muted text-center py-5">Cargando...</p>
        </div>
    </main>

    <div class="modal fade" id="modalPromocion" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="promoModalTitle">Nueva Promoción</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="promocionForm">
                    <div class="modal-body">
                        <input type="hidden" name="edit_id">
                        <div class="mb-3">
                            <label class="form-label">Título</label>
                            <input type="text" class="form-control" name="titulo" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" name="descripcion" rows="2"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descuento (%)</label>
                            <input type="number" class="form-control" name="descuento_porcentaje" min="1" max="100" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Fecha Inicio</label>
                                <input type="date" class="form-control" name="fecha_inicio" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Fecha Fin</label>
                                <input type="date" class="form-control" name="fecha_fin" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="pie-pagina">
        <div class="columna-pie informacion-marca">
            <img src="../imagenes/logo.jpeg" alt="Logo">
            <p class="derechos">2026 NocheLista</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        updateNavGreeting();
        const token = getToken();
        const user = getStoredUser();
        if (!token || !user || user.rol !== 'gestor') {
            window.location.href = '../Carp_login/login.html';
        }

        let hotelId = null;

        async function getHotelId() {
            if (hotelId) return hotelId;
            const data = await apiFetch('/gestor/hotel/');
            hotelId = data.id;
            return hotelId;
        }

        async function cargarPromociones() {
            const container = document.getElementById('promocionesContainer');
            try {
                const hid = await getHotelId();
                const data = await apiFetch(`/gestor/promociones/?hotel_id=${hid}`);
                if (!data.length) {
                    container.innerHTML = '<p class="text-muted text-center py-5">No hay promociones.</p>';
                    return;
                }
                container.innerHTML = data.map(p => `
                    <div class="card shadow-sm mb-3 border-0">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="fw-bold mb-1">${p.titulo}</h5>
                                <span class="badge bg-danger me-2">-${p.descuento_porcentaje}%</span>
                                <small class="text-muted">${p.fecha_inicio} → ${p.fecha_fin}</small>
                                ${p.activo ? '<span class="badge bg-success ms-2">Activa</span>' : '<span class="badge bg-secondary ms-2">Inactiva</span>'}
                                ${p.descripcion ? `<p class="mb-0 text-muted small mt-1">${p.descripcion}</p>` : ''}
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-outline-primary" onclick="togglePromo('${p.id}', ${!p.activo})">${p.activo ? 'Desactivar' : 'Activar'}</button>
                                <button class="btn btn-sm btn-outline-danger" onclick="eliminarPromo('${p.id}')">Eliminar</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = `<p class="text-danger text-center">Error: ${e.message}</p>`;
            }
        }

        function resetPromoForm() {
            document.getElementById('promoModalTitle').textContent = 'Nueva Promoción';
            document.getElementById('promocionForm').reset();
            document.querySelector('#promocionForm [name="edit_id"]').value = '';
        }

        document.getElementById('promocionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const msg = document.getElementById('mensaje');
            const editId = form.edit_id.value;
            const hid = await getHotelId();
            const body = {
                hotel_id: hid,
                titulo: form.titulo.value.trim(),
                descripcion: form.descripcion.value.trim(),
                descuento_porcentaje: parseInt(form.descuento_porcentaje.value),
                fecha_inicio: form.fecha_inicio.value,
                fecha_fin: form.fecha_fin.value
            };
            try {
                if (editId) {
                    await apiFetch(`/gestor/promociones/${editId}/`, { method: 'PUT', body: JSON.stringify(body) });
                } else {
                    await apiFetch('/gestor/promociones/', { method: 'POST', body: JSON.stringify(body) });
                }
                bootstrap.Modal.getInstance(document.getElementById('modalPromocion')).hide();
                msg.innerHTML = '<span style="color:green">Promoción guardada</span>';
                cargarPromociones();
            } catch (err) {
                msg.innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
            }
        });

        async function togglePromo(id, activo) {
            try {
                await apiFetch(`/gestor/promociones/${id}/`, { method: 'PUT', body: JSON.stringify({ activo }) });
                cargarPromociones();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        async function eliminarPromo(id) {
            if (!confirm('¿Eliminar esta promoción?')) return;
            try {
                await apiFetch(`/gestor/promociones/${id}/`, { method: 'DELETE' });
                cargarPromociones();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        window.addEventListener('load', cargarPromociones);
    </script>
</body>
</html>
