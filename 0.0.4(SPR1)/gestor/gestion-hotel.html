<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Hotel - Gestor NocheLista</title>
    <link rel="icon" type="image/png" href="../imagenes/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../estilos.css">
</head>
<body>
    <header class="cabecera">
        <div class="logo"><a href="../index.html"><img src="../imagenes/logo.jpeg" alt="Logo"></a></div>
        <nav>
            <input type="checkbox" id="check">
            <label for="check" class="checkbtn"><i class="fas fa-bars"></i></label>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="gestion-hotel.html">Mi Hotel</a></li>
                <li><a href="gestion-habitaciones.html">Habitaciones</a></li>
                <li><a href="promociones.html">Promociones</a></li>
            </ul>
        </nav>
        <div class="icono-usuario">
            <img src="../imagenes/perfil.png" alt="Gestor" style="border-radius:50%;height:40px;">
            <span id="userGreeting" style="color:#333;margin-left:8px;font-size:14px;"></span>
        </div>
    </header>

    <main class="container my-5">
        <h1 class="fw-bold mb-4">Datos de mi Hotel</h1>
        <div id="mensaje" class="mb-3"></div>
        <form id="hotelForm" class="row g-3" style="display:none;">
            <div class="col-md-6">
                <label class="form-label">Nombre del Hotel</label>
                <input type="text" class="form-control" name="nombre" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Estrellas</label>
                <select class="form-select" name="estrellas">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3" selected>3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Ciudad</label>
                <input type="text" class="form-control" name="ciudad" value="Quito" required>
            </div>
            <div class="col-12">
                <label class="form-label">Dirección</label>
                <input type="text" class="form-control" name="direccion" required>
            </div>
            <div class="col-12">
                <label class="form-label">Descripción</label>
                <textarea class="form-control" name="descripcion" rows="4" required></textarea>
            </div>
            <div class="col-12">
                <label class="form-label">URL Imagen Principal</label>
                <input type="text" class="form-control" name="imagen_principal" placeholder="https://...">
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            </div>
        </form>
        <div id="sinHotel" class="text-center py-5" style="display:none;">
            <p class="text-muted">No tienes un hotel registrado. Si has enviado una solicitud de afiliación, espera a que sea aprobada.</p>
        </div>
    </main>

    <footer class="pie-pagina">
        <div class="columna-pie informacion-marca">
            <img src="../imagenes/logo.jpeg" alt="Logo">
            <p class="derechos">2026 NocheLista</p>
        </div>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        updateNavGreeting();
        const token = getToken();
        const user = getStoredUser();
        if (!token || !user || user.rol !== 'gestor') {
            window.location.href = '../Carp_login/login.html';
        }

        async function loadHotel() {
            try {
                const data = await apiFetch('/gestor/hotel/');
                const form = document.getElementById('hotelForm');
                form.style.display = 'block';
                document.getElementById('sinHotel').style.display = 'none';
                form.nombre.value = data.nombre || '';
                form.estrellas.value = data.estrellas || '3';
                form.ciudad.value = data.ciudad || 'Quito';
                form.direccion.value = data.direccion || '';
                form.descripcion.value = data.descripcion || '';
                form.imagen_principal.value = data.imagen_principal || '';
            } catch (e) {
                document.getElementById('hotelForm').style.display = 'none';
                document.getElementById('sinHotel').style.display = 'block';
            }
        }

        document.getElementById('hotelForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('mensaje');
            const form = e.target;
            msg.innerHTML = '<span style="color:gray">Guardando...</span>';
            try {
                await apiFetch('/gestor/hotel/', {
                    method: 'PUT',
                    body: JSON.stringify({
                        nombre: form.nombre.value.trim(),
                        estrellas: parseInt(form.estrellas.value),
                        ciudad: form.ciudad.value.trim(),
                        direccion: form.direccion.value.trim(),
                        descripcion: form.descripcion.value.trim(),
                        imagen_principal: form.imagen_principal.value.trim()
                    })
                });
                msg.innerHTML = '<span style="color:green">Hotel actualizado correctamente</span>';
            } catch (err) {
                msg.innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
            }
        });

        loadHotel();
    </script>
</body>
</html>
