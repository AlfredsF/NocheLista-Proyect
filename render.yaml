services:
  # ── Backend Django (Web Service) ──────────────────────────
  - type: web
    name: nochelista-backend
    runtime: python
    rootDir: NocheLista/NocheLista/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn nochelista.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: "nochelista-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://nochelista-frontend.onrender.com,http://localhost:5173,http://localhost:8000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.8"

  # ── Frontend React (Static Site) ──────────────────────────
  - type: static_site
    name: nochelista-frontend
    buildCommand: cd frontend-react && npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_KEY
        sync: false
      - key: VITE_API_URL
        value: "https://nochelista-backend.onrender.com/api"
